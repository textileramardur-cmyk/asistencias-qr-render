services:
  - type: web
    name: asistencias-qr-render
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistencias-qr-db
          property: connectionString
      - key: DATA_DIR
        value: /var/data
      - key: DEFAULT_ADMIN_USERNAME
        value: Admin4rd
      - key: DEFAULT_ADMIN_PASSWORD
        value: Adm4rd
      - key: SESSION_DAYS
        value: "14"
    disk:
      name: asistencias-uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: asistencias-qr-db
    databaseName: asistencias_qr
    user: asistencias_qr_user
    plan: free
